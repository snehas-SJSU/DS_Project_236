openapi: 3.0.0
info:
  title: LinkedIn AgenticAI API
  version: 1.0.0
  description: |
    Complete distributed system backend API documentation for Data 236 Project.

    **Agentic AI (FastAPI):** Paths under `/ai/*` are proxied to the AI Uvicorn service (default **8001**; set env `AI_SERVICE_PORT` on the gateway to match your AI port, e.g. **8772**).
    Use this gateway (`/api` prefix) for **Try it out** — e.g. `POST /api/ai/tasks/submit` → `http://127.0.0.1:{AI_SERVICE_PORT}/ai/tasks/submit`.
    **WebSocket:** `ws://localhost:4000/api/ai/ws/ai/tasks/{task_id}` (proxied to FastAPI `/ws/ai/tasks/{task_id}`). OpenAPI does not model WebSockets; use a WS client or FastAPI `/docs` on the AI port.
    Canonical interactive docs for the Python service alone: `http://127.0.0.1:{AI_SERVICE_PORT}/docs`.
servers:
  - url: http://localhost:4000/api
    description: Local API Gateway

paths:
  # Member Service
  /members/create:
    post:
      tags: [Profile Service]
      summary: Create a new member profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                name:
                  type: string
                title:
                  type: string
                headline:
                  type: string
                location:
                  type: string
                skills:
                  type: array
                  items:
                    type: string
                resume_text:
                  type: string
                about:
                  type: string
            example:
              email: cand_demo@test.com
              name: Demo Candidate
              title: Software Engineer
              location: San Jose
              skills: [python, kafka, fastapi]
              resume_text: Engineer with 5 years Python, Kafka, and FastAPI.
      responses:
        '201':
          description: Created
  /members/get:
    post:
      tags: [Profile Service]
      summary: Retrieve a member profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [member_id]
              properties:
                member_id:
                  type: string
            example:
              member_id: M-101
      responses:
        '200':
          description: OK
  /members/update:
    post:
      tags: [Profile Service]
      summary: Update member fields
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [member_id]
              properties:
                member_id:
                  type: string
                name:
                  type: string
                title:
                  type: string
                location:
                  type: string
                skills:
                  type: array
                  items:
                    type: string
                resume_text:
                  type: string
            example:
              member_id: M-101
              resume_text: Updated resume text for testing.
      responses:
        '200':
          description: OK
  /members/delete:
    post:
      tags: [Profile Service]
      summary: Soft-delete member profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [member_id]
              properties:
                member_id:
                  type: string
            example:
              member_id: M-101
      responses:
        '200':
          description: OK
  /members/search:
    post:
      tags: [Profile Service]
      summary: Full-text search across members
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                keyword:
                  type: string
                location:
                  type: string
                skill:
                  type: string
            example: {}
      responses:
        '200':
          description: OK

  # Job Service
  /jobs/create:
    post:
      tags: [Job Service]
      summary: Create a new job posting
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                company:
                  type: string
                company_id:
                  type: string
                location:
                  type: string
                salary:
                  type: string
                type:
                  type: string
                employment_type:
                  type: string
                description:
                  type: string
                skills:
                  type: array
                  items:
                    type: string
                recruiter_id:
                  type: string
                industry:
                  type: string
                seniority_level:
                  type: string
                remote_mode:
                  type: string
            example:
              title: Platform Engineer
              company: LinkedIn Sim
              location: San Jose
              type: full-time
              employment_type: full-time
              seniority_level: mid
              skills: [python, kafka, fastapi, redis]
              description: Build scalable backend services.
              recruiter_id: R-5001
      responses:
        '201':
          description: Created
  /jobs/get:
    post:
      tags: [Job Service]
      summary: Get job details
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [job_id]
              properties:
                job_id:
                  type: string
                member_id:
                  type: string
                  description: Optional viewer for applied/saved flags
            example:
              job_id: J-LIVE-1
      responses:
        '200':
          description: OK
  /jobs/update:
    post:
      tags: [Job Service]
      summary: Update job fields
      responses:
        '200':
          description: OK
  /jobs/search:
    post:
      tags: [Job Service]
      summary: Search and filter jobs
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                keyword:
                  type: string
                location:
                  type: string
                type:
                  type: string
                industry:
                  type: string
                remote:
                  type: string
                company:
                  type: string
            example: {}
      responses:
        '200':
          description: OK
  /jobs/close:
    post:
      tags: [Job Service]
      summary: Close a job posting
      responses:
        '200':
          description: OK
  /jobs/byRecruiter:
    post:
      tags: [Job Service]
      summary: List all jobs by specific recruiter
      responses:
        '200':
          description: OK
  /jobs/save:
    post:
      tags: [Job Service]
      summary: Save a job for a member
      responses:
        '200':
          description: OK

  # Application Service
  /applications/submit:
    post:
      tags: [Application Service]
      summary: Submit a job application
      responses:
        '201':
          description: Created
  /applications/get:
    post:
      tags: [Application Service]
      summary: Get application details
      responses:
        '200':
          description: OK
  /applications/byJob:
    post:
      tags: [Application Service]
      summary: List all applications for a job
      responses:
        '200':
          description: OK
  /applications/byMember:
    post:
      tags: [Application Service]
      summary: List all applications by a member
      responses:
        '200':
          description: OK
  /applications/updateStatus:
    post:
      tags: [Application Service]
      summary: Update application status through funnel
      responses:
        '200':
          description: OK
  /applications/addNote:
    post:
      tags: [Application Service]
      summary: Add recruiter note to application
      responses:
        '200':
          description: OK

  # Messaging Service
  /threads/open:
    post:
      tags: [Messaging Service]
      summary: Create a message thread
      responses:
        '201':
          description: Created
  /threads/get:
    post:
      tags: [Messaging Service]
      summary: Get thread metadata
      responses:
        '200':
          description: OK
  /threads/byUser:
    post:
      tags: [Messaging Service]
      summary: List all threads for a user
      responses:
        '200':
          description: OK
  /messages/send:
    post:
      tags: [Messaging Service]
      summary: Send a message in thread
      responses:
        '201':
          description: Created
  /messages/list:
    post:
      tags: [Messaging Service]
      summary: List messages in thread
      responses:
        '200':
          description: OK

  # Connections Service
  /connections/request:
    post:
      tags: [Connection Service]
      summary: Send connection request
      responses:
        '201':
          description: Created
  /connections/accept:
    post:
      tags: [Connection Service]
      summary: Accept request
      responses:
        '200':
          description: OK
  /connections/reject:
    post:
      tags: [Connection Service]
      summary: Reject request
      responses:
        '200':
          description: OK
  /connections/list:
    post:
      tags: [Connection Service]
      summary: List all user connections
      responses:
        '200':
          description: OK
  /connections/requestsByUser:
    post:
      tags: [Connection Service]
      summary: List incoming and sent connection requests by user
      responses:
        '200':
          description: OK

  # Analytics Service
  /events/ingest:
    post:
      tags: [Analytics Service]
      summary: Ingest behavioral event
      responses:
        '202':
          description: Accepted
  /analytics/jobs/top:
    post:
      tags: [Analytics Service]
      summary: Top jobs by metric
      responses:
        '200':
          description: OK
  /analytics/funnel:
    post:
      tags: [Analytics Service]
      summary: Application funnel
      responses:
        '200':
          description: OK
  /analytics/geo:
    post:
      tags: [Analytics Service]
      summary: Geographic distribution
      responses:
        '200':
          description: OK
  /analytics/member/dashboard:
    post:
      tags: [Analytics Service]
      summary: Member dashboard metrics
      responses:
        '200':
          description: OK

  /applications/apply:
    post:
      tags: [Application Service]
      summary: Submit application (alias of submit)
      responses:
        '201':
          description: Created

  # Agentic AI Service (same contract as FastAPI/Uvicorn; gateway adds /api prefix)
  /ai/tasks/submit:
    post:
      tags: [Agentic AI Service]
      summary: Submit AI task asynchronously
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [task_type, job_id, actor_id]
              properties:
                task_type:
                  type: string
                  enum: [candidate_shortlist]
                job_id:
                  type: string
                candidate_ids:
                  type: array
                  items:
                    type: string
                  description: Required when candidate_source is explicit (default). Ignored for job_applicants / members_search.
                candidate_source:
                  type: string
                  enum: [explicit, job_applicants, members_search]
                  default: explicit
                member_search:
                  type: object
                  description: Required filters when candidate_source is members_search (at least one field).
                  properties:
                    keyword: { type: string }
                    location: { type: string }
                    skill: { type: string }
                actor_id:
                  type: string
                trace_id:
                  type: string
                client_request_id:
                  type: string
            example:
              task_type: candidate_shortlist
              job_id: J-LIVE-1
              candidate_ids: [M-101, M-202, M-303]
              actor_id: R-5001
      responses:
        '202':
          description: Accepted
  /ai/tasks/{task_id}/approve:
    post:
      tags: [Agentic AI Service]
      summary: Human-in-the-loop approve / edit / reject
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [decision, reviewer_id]
              properties:
                decision:
                  type: string
                  enum: [approve, edit, reject]
                edited_text:
                  type: string
                  description: Required when decision is edit
                reviewer_id:
                  type: string
            example:
              decision: edit
              edited_text: Looks good, please schedule a call.
              reviewer_id: R-5001
      responses:
        '200':
          description: OK
  /ai/tasks/{task_id}:
    get:
      tags: [Agentic AI Service]
      summary: Get task status and partial results
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
  /ai/tasks/{task_id}/events:
    get:
      tags: [Agentic AI Service]
      summary: Get task event stream for observability
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 200
      responses:
        '200':
          description: OK
  /ai/tasks:
    get:
      tags: [Agentic AI Service]
      summary: List AI tasks (optional filter by recruiter actor_id)
      parameters:
        - name: actor_id
          in: query
          required: false
          schema:
            type: string
          description: When set, returns tasks for that recruiter
      responses:
        '200':
          description: OK
  /ai/health:
    get:
      tags: [Agentic AI Service]
      summary: AI service health (via gateway)
      responses:
        '200':
          description: OK
  /ai/resume/parse:
    post:
      tags: [Agentic AI Service]
      summary: Parse resume synchronously
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                member_id:
                  type: string
                text:
                  type: string
            example:
              member_id: M-101
      responses:
        '200':
          description: OK
  /ai/match/score:
    post:
      tags: [Agentic AI Service]
      summary: Score job match
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [job_id, parsed_profile]
              properties:
                job_id:
                  type: string
                member_id:
                  type: string
                parsed_profile:
                  type: object
            example:
              job_id: J-LIVE-1
              parsed_profile:
                member_id: M-101
                skills: [python, kafka, fastapi]
                resume_text: Python engineer with 5 years Kafka and FastAPI.
                location: San Jose
                seniority: mid
      responses:
        '200':
          description: OK
  /ai/shortlist:
    post:
      tags: [Agentic AI Service]
      summary: Fetch ranked shortlist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [job_id, scores]
              properties:
                job_id:
                  type: string
                scores:
                  type: array
                  items:
                    type: object
                top_k:
                  type: integer
            example:
              job_id: J-LIVE-1
              top_k: 3
              scores:
                - member_id: M-101
                  score: 0.85
      responses:
        '200':
          description: OK
  /ai/outreach/draft:
    post:
      tags: [Agentic AI Service]
      summary: Draft recruiter outreach
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [job_id, shortlist]
              properties:
                job_id:
                  type: string
                shortlist:
                  type: array
                  items:
                    type: object
                actor_id:
                  type: string
            example:
              job_id: J-LIVE-1
              actor_id: R-5001
              shortlist:
                - member_id: M-101
                  score: 0.85
      responses:
        '200':
          description: OK
  /ai/career-coach/suggest:
    post:
      tags: [Agentic AI Service]
      summary: Get career suggestions
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: OK
  /ai/metrics:
    get:
      tags: [Agentic AI Service]
      summary: AI metrics summary (alias)
      responses:
        '200':
          description: OK
  /ai/metrics/summary:
    get:
      tags: [Agentic AI Service]
      summary: AI metrics summary
      responses:
        '200':
          description: OK

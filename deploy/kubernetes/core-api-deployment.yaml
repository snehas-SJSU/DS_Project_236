# Example: FastAPI core API (replace image and use Secrets for credentials).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: linkedin-core-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: linkedin-core-api
  template:
    metadata:
      labels:
        app: linkedin-core-api
    spec:
      containers:
        - name: api
          image: YOUR_ACCOUNT.dkr.ecr.YOUR_REGION.amazonaws.com/linkedin-core-api:latest
          ports:
            - containerPort: 4000
          env:
            - name: RUN_WORKERS
              value: "0"
            - name: MYSQL_HOST
              value: "mysql-service"
            - name: MYSQL_PORT
              value: "3306"
            - name: MYSQL_USER
              value: "linkedin_user"
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: linkedin-db
                  key: mysql-password
            - name: MYSQL_DATABASE
              value: "linkedin_db"
            - name: REDIS_URL
              value: "redis://redis-service:6379/0"
            - name: MONGO_URL
              value: "mongodb://mongo-service:27017"
            - name: MONGO_DB
              value: "linkedin_sim"
            - name: KAFKA_BROKERS
              value: "kafka-service:9092"
            - name: AI_SERVICE_URL
              value: "http://linkedin-ai-service:8001"
---
apiVersion: v1
kind: Service
metadata:
  name: linkedin-core-api
spec:
  selector:
    app: linkedin-core-api
  ports:
    - port: 4000
      targetPort: 4000

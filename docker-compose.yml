services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: linkedin-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - linkedin-net

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: linkedin-kafka
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      # Internal clients (Docker DNS) must resolve the advertised host — use service name `kafka`.
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper
    networks:
      - linkedin-net

  mysql:
    image: mysql:8.0
    container_name: linkedin-mysql
    command: --max_allowed_packet=67108864 --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    ports:
      - "3307:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=linkedin_db
      - MYSQL_USER=linkedin_user
      - MYSQL_PASSWORD=linkedin_pass
    volumes:
      - mysql-data:/var/lib/mysql
      # First-time DB init only: create jobs table + import demo jobs (logos/metadata). Re-run after
      # `docker compose down -v` or use `npm run seed:demo-jobs` on existing volumes.
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
      - ./scripts/seed-demo-jobs.sql:/seed-demo-jobs.sql:ro
    networks:
      - linkedin-net

  mongodb:
    image: mongo:6.0
    container_name: linkedin-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - linkedin-net

  redis:
    image: redis:7.0-alpine
    container_name: linkedin-redis
    ports:
      - "6380:6379"
    networks:
      - linkedin-net

